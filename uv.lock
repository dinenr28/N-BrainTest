// ==========================================
// 1. RUMUS LOGIKA PENILAIAN (UTILS)
// ==========================================
export const hitungSkorAkhir = (daftarSoal, daftarJawabanUser) => {
  if (!daftarSoal || daftarSoal.length === 0) return 0;
  
  let benar = 0;

  daftarSoal.forEach((soal) => {
    const userAnsItem = daftarJawabanUser.find((j) => j.soalId === soal.id);
    if (!userAnsItem || !userAnsItem.jawaban) return; // Skip kalau tidak dijawab

    const userAns = userAnsItem.jawaban.trim().toLowerCase();
    const correctAns = soal.kunciJawaban.trim().toLowerCase();

    if (soal.tipe === 'pilihan_ganda') {
      if (userAns === correctAns) benar++;
    } else {
      // Logika essay: fleksibel, benar jika mirip atau mengandung kata kunci
      if (correctAns.includes(userAns) || userAns.includes(correctAns)) benar++;
    }
  });

  return Math.round((benar / daftarSoal.length) * 100);
};

