export interface Soal {
  id: string;
  tipe: 'pilihan-ganda' | 'essay';
  pertanyaan: string;
  opsi?: string[]; // Hanya untuk pilihan ganda
  jawabanBenar: string;
  pembahasan: string;
}

export interface Materi {
  id: string;
  judul: string;
  kontenMateri: string;
  preTest: Soal[];
  latihanSoal: Soal[];
  postTest: Soal[];
}

export interface MapelData {
  nama: string;
  tingkat: ('SD' | 'SMP' | 'SMA')[];
  daftarMateri: { [key: string]: Materi[] }; // Kunci berupa tingkat (e.g., 'SMA')
}

