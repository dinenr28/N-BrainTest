import math

# ==========================================
# 1. RUMUS LOGIKA EVALUASI NILAI
# ==========================================
def hitung_skor_akhir(daftar_soal, jawaban_user):
    """
    Menghitung nilai evaluasi (Skala 0-100) untuk Pilihan Ganda dan Essay.
    jawaban_user berupa dictionary format: { "soal_id": "jawaban_anda" }
    """
    if not daftar_soal:
        return 0
        
    benar = 0
    for soal in daftar_soal:
        soal_id = soal.get("id")
        # Jika soal tidak dijawab oleh user, lewati
        if soal_id not in jawaban_user:
            continue
            
        user_ans = str(jawaban_user[soal_id]).strip().lower()
        kunci = str(soal.get("kunci_jawaban")).strip().lower()
        
        if soal.get("tipe") == "pilihan_ganda":
            if user_ans == kunci:
                benar += 1
        elif soal.get("tipe") == "essay":
            # Logika fleksibel essay: benar jika mengandung kata kunci
            if kunci in user_ans or user_ans in kunci:
                benar += 1
                
    return round((benar / len(daftar_soal)) * 100)


