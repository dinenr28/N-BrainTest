'use client';
import { useState } from 'react';
import { bankSoal } from '@/data/bankSoal';
import Link from 'next/link';

export default function Home() {
  const [themeColor, setThemeColor] = useState('bg-indigo-600');
  const [selectedMapel, setSelectedMapel] = useState('matematika');
  const [selectedTingkat, setSelectedTingkat] = useState('SMA');

  const themes = [
    { name: 'Sunset Orange', color: 'bg-orange-500', hex: '#f97316' },
    { name: 'Ocean Blue', color: 'bg-blue-500', hex: '#3b82f6' },
    { name: 'Cyber Neon', color: 'bg-purple-600', hex: '#9333ea' },
    { name: 'Mint Green', color: 'bg-emerald-500', hex: '#10b981' }
  ];

  const materiTersedia = bankSoal[selectedMapel]?.daftarMateri[selectedTingkat] || [];

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 p-8">
      {/* Header & Custom Color Picker */}
      <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
        <div>
          <h1 className="text-3xl font-black tracking-tight text-slate-900">Edu✨Aesthetic</h1>
          <p className="text-slate-500 text-sm">Pilih gaya belajarmu sendiri</p>
        </div>
        <div className="flex gap-2 mt-4 md:mt-0 items-center">
          <span className="text-xs font-semibold uppercase text-slate-400 mr-2">Tema:</span>
          {themes.map((t) => (
            <button
              key={t.name}
              onClick={() => setThemeColor(t.color)}
              className={`w-8 h-8 rounded-full ${t.color} border-4 transition-all ${themeColor === t.color ? 'border-slate-800 scale-110' : 'border-transparent'}`}
              title={t.name}
            />
          ))}
        </div>
      </div>

      {/* Grid Menu Utama */}
      <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        {/* Pilihan Mapel & Jenjang */}
        <div className="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
          <div>
            <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Mata Pelajaran</label>
            <div className="flex flex-col gap-2">
              {Object.keys(bankSoal).map((key) => (
                <button
                  key={key}
                  onClick={() => { setSelectedMapel(key); setSelectedTingkat(bankSoal[key].tingkat[0]); }}
                  className={`w-full text-left p-3 rounded-xl font-medium capitalize transition-all ${selectedMapel === key ? `${themeColor} text-white` : 'bg-slate-100 hover:bg-slate-200'}`}
                >
                  {bankSoal[key].nama}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Tingkat Sekolah</label>
            <div className="grid grid-cols-3 gap-2">
              {bankSoal[selectedMapel]?.tingkat.map((tingkat) => (
                <button
                  key={tingkat}
                  onClick={() => setSelectedTingkat(tingkat)}
                  className={`p-2 rounded-xl font-bold text-center border transition-all ${selectedTingkat === tingkat ? 'border-slate-800 bg-slate-900 text-white' : 'border-slate-200 hover:bg-slate-50'}`}
                >
                  {tingkat}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Daftar Materi */}
        <div className="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <h2 className="text-xl font-bold mb-4 text-slate-900">Pilih Materi Modul</h2>
          {materiTersedia.length === 0 ? (
            <p className="text-slate-400 text-sm">Materi belum diunggah untuk tingkat ini.</p>
          ) : (
            <div className="flex flex-col gap-3">
              {materiTersedia.map((materi) => (
                <div key={materi.id} className="p-4 border border-slate-100 hover:border-slate-300 rounded-xl flex justify-between items-center transition-all">
                  <div>
                    <h3 className="font-semibold text-slate-800">{materi.judul}</h3>
                    <span className="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">Tersedia: Pre-test & Post-test</span>
                  </div>
                  <Link href={`/belajar/${selectedMapel}-${selectedTingkat}-${materi.id}`}>
                    <button className={`px-4 py-2 text-white font-medium text-sm rounded-xl ${themeColor} hover:opacity-90 transition-all`}>
                      Mulai Belajar
                    </button>
                  </Link>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
'use client';
import { useState } from 'react';
import { Soal } from '@/data/bankSoal';

interface QuizEngineProps {
  daftarSoal: Soal[];
  tipeTes: 'Pre-Test' | 'Latihan Soal' | 'Post-Test';
  onSelesai: () => void;
}

export default function QuizEngine({ daftarSoal, tipeTes, onSelesai }: QuizEngineProps) {
  const [jawabanUser, setJawabanUser] = useState<{ [key: string]: string }>({});
  const [kuisSelesai, setKuisSelesai] = useState(false);
  const [skor, setSkor] = useState(0);

  const handlePilihOpsi = (soalId: string, nilai: string) => {
    setJawabanUser(prev => ({ ...prev, [soalId]: nilai }));
  };

  const hitungHasil = () => {
    let nilaiBenar = 0;
    daftarSoal.forEach((soal) => {
      // Untuk essay, kita buat lowercase agar pengecekan string lebih fleksibel
      if (jawabanUser[soal.id]?.trim().toLowerCase() === soal.jawabanBenar.toLowerCase()) {
        nilaiBenar++;
      }
    });
    setSkor(Math.round((nilaiBenar / daftarSoal.length) * 100));
    setKuisSelesai(true);
  };

  return (
    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 max-w-2xl mx-auto">
      <div className="flex justify-between items-center mb-6 pb-4 border-b">
        <h3 className="text-lg font-black tracking-wide text-slate-900 uppercase">{tipeTes}</h3>
        {kuisSelesai && <span className="text-xl font-bold text-emerald-600">Skor: {skor}/100</span>}
      </div>

      <div className="flex flex-col gap-6">
        {daftarSoal.map((soal, indeks) => (
          <div key={soal.id} className="p-4 bg-slate-50 rounded-xl border border-slate-100">
            <p className="font-semibold text-slate-800 mb-3">{indeks + 1}. {soal.pertanyaan}</p>
            
            {/* Logika Tampilan Pilihan Ganda */}
            {soal.tipe === 'pilihan-ganda' && soal.opsi && (
              <div className="grid grid-cols-1 gap-2">
                {soal.opsi.map((opsi) => (
                  <button
                    key={opsi}
                    disabled={kuisSelesai}
                    onClick={() => handlePilihOpsi(soal.id, opsi)}
                    className={`p-3 text-left rounded-lg text-sm transition-all border ${
                      jawabanUser[soal.id] === opsi 
                        ? 'bg-slate-900 text-white border-slate-900' 
                        : 'bg-white hover:bg-slate-100 text-slate-700 border-slate-200'
                    }`}
                  >
                    {opsi}
                  </button>
                ))}
              </div>
            )}

            {/* Logika Tampilan Essay */}
            {soal.tipe === 'essay' && (
              <input
                type="text"
                disabled={kuisSelesai}
                placeholder="Ketik jawabanmu di sini..."
                value={jawabanUser[soal.id] || ''}
                onChange={(e) => handlePilihOpsi(soal.id, e.target.value)}
                className="w-full p-3 rounded-lg text-sm border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-slate-400"
              />
            )}

            {/* BOX PEMBAHASAN (Hanya muncul jika kuis selesai dikerjakan) */}
            {kuisSelesai && (
              <div className="mt-4 p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-900">
                <p className="font-bold mb-1">🔑 Jawaban Benar: {soal.jawabanBenar}</p>
                <p><span className="font-bold">Pembahasan:</span> {soal.pembahasan}</p>
              </div>
            )}
          </div>
        ))}
      </div>

      {!kuisSelesai ? (
        <button
          onClick={hitungHasil}
          className="w-full mt-6 bg-slate-900 text-white font-bold p-3 rounded-xl hover:bg-slate-800 transition-all"
        >
          Kumpulkan Jawaban
        </button>
      ) : (
        <button
          onClick={onSelesai}
          className="w-full mt-6 bg-emerald-600 text-white font-bold p-3 rounded-xl hover:bg-emerald-700 transition-all"
        >
          Lanjut ke Tahap Berikutnya
        </button>
      )}
    </div>
  );
}
