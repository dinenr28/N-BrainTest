// ==========================================
// 1. DEFINISI TIPE DATA (TYPES)
// ==========================================
export type Jenjang = 'SD' | 'SMP' | 'SMA';
export type TipeSoal = 'pilihan_ganda' | 'essay';
export type JenisTes = 'pre_test' | 'latihan_materi' | 'post_test';

export interface Soal {
  id: string;
  tipe: TipeSoal;
  pertanyaan: string;
  pilihan?: string[]; // Hanya untuk pilihan_ganda
  kunciJawaban: string; // Kunci jawaban (A/B/C/D atau kata kunci essay)
  pembahasan: string; // Pembahasan di akhir sesi
}

export interface Materi {
  id: string;
  judul: string;
  isiKonten: string; // Materi sebelum ngerjain soal
  soalLatihan: Soal[];
}

export interface MataPelajaran {
  id: 'matematika' | 'fisika' | 'kimia';
  nama: string;
  jenjangTersedia: Jenjang[];
  daftarMateri: {
    [key in Jenjang]?: Materi[];
  };
  preTest: { [key in Jenjang]?: Soal[] };
  postTest: { [key in Jenjang]?: Soal[] };
}

export interface JawabanUser {
  soalId: string;
  jawaban: string;
}


// ==========================================
// 2. RUMUS LOGIKA PENILAIAN (UTILS)
// ==========================================
export const hitungSkorAkhir = (daftarSoal: Soal[], daftarJawabanUser: JawabanUser[]): number => {
  if (daftarSoal.length === 0) return 0;
  
  let benar = 0;

  daftarSoal.forEach((soal) => {
    const userAns = daftarJawabanUser.find((j) => j.soalId === soal.id)?.jawaban.trim().toLowerCase();
    const correctAns = soal.kunciJawaban.trim().toLowerCase();

    if (!userAns) return; // Jika tidak dijawab, lanjut ke soal berikutnya

    if (soal.tipe === 'pilihan_ganda') {
      if (userAns === correctAns) benar++;
    } else {
      // Logika essay: benar jika jawaban user mengandung kata kunci jawaban
      if (correctAns.includes(userAns) || userAns.includes(correctAns)) benar++;
    }
  });

  // Rumus matematika skor skala 0 - 100
  return Math.round((benar / daftarSoal.length) * 100);
};


